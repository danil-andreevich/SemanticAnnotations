{% extends "base.html" %}

{% block title %}Загрузка документа{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-xl border border-slate-200 p-8 shadow-sm">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-900">Загрузка документа</h1>
        <p class="text-sm text-slate-500 mt-1">Проект: <span class="font-medium text-slate-700">"{{ project.name }}"</span></p>
    </div>

    <form method="post" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Название документа</label>
            <input type="text" name="name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="Например: Договор №42 или Статья про ИИ">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Текст документа</label>
            <textarea name="content" rows="12" required class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm transition" placeholder="Вставьте сюда сырой текст для автоматической разметки моделью..."></textarea>
        </div>

        <div class="flex items-center justify-end space-x-3 pt-4 border-t border-slate-100">
            <a href="{{ url_for('projects.project_detail', project_id=project.id) }}" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 border border-slate-200 rounded-lg transition">Отмена</a>
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm transition flex items-center gap-2">
                 Загрузить и аннотировать
            </button>
        </div>
    </form>
</div>
{% endblock %}
