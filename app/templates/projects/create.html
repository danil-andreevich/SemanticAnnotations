{% extends "base.html" %}

{% block title %}Создать проект{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-xl border border-slate-200 p-8 shadow-sm">
    <h1 class="text-2xl font-bold text-slate-900 mb-6">Создание проекта</h1>

    <form method="post" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Название проекта</label>
            <input type="text" name="name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="Например: Анализ финансовых отчетов">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Классы аннотаций</label>
            <input type="text" name="classes" placeholder="Например: дата, время, место" required class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
            <p class="mt-2 text-xs text-slate-400">Введите названия классов сущностей через запятую.</p>
        </div>

        <div class="flex items-center justify-end space-x-3 pt-4 border-t border-slate-100">
            <a href="{{ url_for('projects.list_projects') }}" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 border border-slate-200 rounded-lg transition">Отмена</a>
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm transition">Создать проект</button>
        </div>
    </form>
</div>
{% endblock %}
